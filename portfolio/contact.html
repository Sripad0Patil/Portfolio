<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="contact.css">
    <title>Contact - Portfolio Website</title>
</head>
<body>
    <header>
        <a href="index.html" class="logo">Appu</a>
        <nav>
            <a href="index.html">Home</a>
            <!-- <a href="services.html">Services</a> -->
            <a href="skills.html">Skills</a>
            <a href="education.html">Education</a>
            <a href="experience.html">Experience</a>
            <a href="contact.html" class="active">Contact</a>
        </nav>
        <div class="theme-switcher">
            <i class="fas fa-sun"></i>
            <i class="fas fa-moon"></i>
        </div>
    </header>
    <section class="contact">
        <h2 class="section-title">Get In Touch</h2>
        <div class="contact-container">
            <div class="contact-info">
                <div class="info-card">
                    <div class="icon-wrapper">
                        <i class="fas fa-envelope"></i>
                    </div>
                    <h3>Email</h3>
                    <p>patilshripad925@gmail.com</p>
                    <a href="mailto:patilshripad925@gmail.com" class="contact-link">Send Email</a>
                </div>
                <div class="info-card">
                    <div class="icon-wrapper">
                        <i class="fas fa-phone"></i>
                    </div>
                    <h3>Phone</h3>
                    <p>+91 90192 91864</p>
                    <a href="tel:+919019291864" class="contact-link">Call Now</a>
                </div>
                <div class="info-card">
                    <div class="icon-wrapper">
                        <i class="fas fa-map-marker-alt"></i>
                    </div>
                    <h3>Location</h3>
                    <p>Karnataka, India</p>
                    <a href="https://maps.google.com" target="_blank" class="contact-link">View on Map</a>
                </div>
                <div class="info-card">
                    <div class="icon-wrapper">
                        <i class="fas fa-clock"></i>
                    </div>
                    <h3>Available Hours</h3>
                    <p>Mon - Fri: 9:00 AM - 6:00 PM</p>
                    <span class="status-badge">Available Now</span>
                </div>
            </div>
        </div>
    </section>
    <script>
        const themeSwitcher = document.querySelector('.theme-switcher');
        const html = document.documentElement;
        
        themeSwitcher.addEventListener('click', () => {
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });

        const savedTheme = localStorage.getItem('theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
    </script>
</body>
</html>
